intent:
  name: Send command
  description: Send a command to an iMow mower (Gen5+).
  fields:
    action:
      name: Action
      description: >
        Command to send. Accepted values:
        start-mowing, pause, resume, end-job-and-return-to-dock,
        toDocking, edgeMowing, startMowingFromPoint.
        Friendly aliases: startMowing, stop_mowing, park, edge.
      required: true
      example: "start-mowing"
      selector:
        select:
          options:
            - "start-mowing"
            - "pause"
            - "resume"
            - "end-job-and-return-to-dock"
            - "toDocking"
            - "edgeMowing"
            - "startMowingFromPoint"
    mower_device:
      name: Mower device
      description: Device ID from the HA device registry.
      required: false
      example: "abc123def456"
      selector:
        device:
          integration: imow_v2
    mower_name:
      name: Mower name
      description: Friendly name of the mower device.
      required: false
      example: "My iMow"
      selector:
        text:
    startpoint:
      name: Start point
      description: Zone / start-point index (for startMowingFromPoint only).
      required: false
      example: 1
      selector:
        number:
          min: 1
          max: 10
          mode: box
